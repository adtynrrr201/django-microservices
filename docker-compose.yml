version: '3.9'
services:
  web:
    build: .
    container_name: django_app
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - POSTGRES_DB=coba
      - POSTGRES_USER=adityanur
      - POSTGRES_PASSWORD=201201
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: coba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 201201
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
